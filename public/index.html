<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cup Quiz</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script>
      const loadJson = async (path) => {
        const response = await fetch(path);

        if (!response.ok) {
          throw new Error(`${path}: ${response.status} ${response.statusText}`);
        }

        return response.json();
      };

      Promise.all([
        loadJson("data/teams.json"),
        loadJson("data/games.json"),
        loadJson("data/countries.json"),
        loadJson("data/quiz.json")
      ])
        .then(([teams, games, countries, quiz]) => {
          const app = Elm.Main.init({
            node: document.getElementById("app"),
            flags: { teams, games, countries, quiz }
          });

          app.ports.copyText.subscribe(async (value) => {
            try {
              await navigator.clipboard.writeText(value);
            } catch {
              const input = document.createElement("textarea");
              input.value = value;
              input.style.position = "fixed";
              input.style.opacity = "0";
              document.body.appendChild(input);
              input.select();
              document.execCommand("copy");
              input.remove();
            }
          });
        })
        .catch((error) => {
          document.getElementById("app").textContent =
            `Die Turnierdaten konnten nicht geladen werden: ${error.message}`;
        });
    </script>
  </body>
</html>
